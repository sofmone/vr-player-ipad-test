<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>360 VR Player iPad</title>

<style>
body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; touch-action:none; }

#player { width:100vw; height:100vh; }

#controls {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  color:#fff;
  opacity:0;
  transition:0.3s;
}

.row { display:flex; align-items:center; gap:10px; }

#progress { width:100%; }

/* 音量 */
#volumeBox { position:relative; }

#volumeSlider {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  height:100px;
  display:none;
}

/* 按钮 */
#reset {
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:10px;
}

#fullscreen {
  position:fixed;
  right:20px;
  bottom:20px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}

/* loading */
#loading {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-size:20px;
  display:none;
}
</style>
</head>

<body>

<div id="player"></div>

<div id="loading">加载中...</div>

<div id="controls">
  <div class="row">
    <button onclick="togglePlay()">▶/⏸</button>
    <span id="time">0:00 / 0:00</span>

    <select id="quality"></select>

    <div id="volumeBox">
      <button onclick="toggleVolume()">🔊</button>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01">
    </div>
  </div>

  <input type="range" id="progress" min="0" max="100">
</div>

<div id="reset">重置</div>
<div id="fullscreen">⛶</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let scene, camera, renderer, video, texture, hls;
let lon=90, lat=0;
let controls=document.getElementById("controls");

let touchStartX, touchStartY;
let lastDistance = null;

init();
animate();

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(90,innerWidth/innerHeight,1,1100);

  renderer=new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.getElementById("player").appendChild(renderer.domElement);

  const geo=new THREE.SphereGeometry(500,60,40);
  geo.scale(-1,1,1);

  video=document.createElement('video');
  video.crossOrigin="anonymous";

  texture=new THREE.VideoTexture(video);
  scene.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({map:texture})));

  // ===== 手势控制 =====
  renderer.domElement.addEventListener("touchstart", e=>{
    if(e.touches.length===1){
      touchStartX=e.touches[0].clientX;
      touchStartY=e.touches[0].clientY;
    }

    if(e.touches.length===2){
      lastDistance=getDistance(e);
    }
  });

  renderer.domElement.addEventListener("touchmove", e=>{
    if(e.touches.length===1){
      let dx=e.touches[0].clientX-touchStartX;
      let dy=e.touches[0].clientY-touchStartY;

      lon -= dx*0.1;
      lat += dy*0.1;

      touchStartX=e.touches[0].clientX;
      touchStartY=e.touches[0].clientY;
    }

    if(e.touches.length===2){
      let dist=getDistance(e);
      let delta=dist-lastDistance;

      camera.fov -= delta*0.05;
      camera.fov=Math.max(30,Math.min(100,camera.fov));
      camera.updateProjectionMatrix();

      lastDistance=dist;
    }
  });

  // 单击显示UI
  renderer.domElement.addEventListener("touchend", ()=>{
    controls.style.opacity = controls.style.opacity=="1"?"0":"1";
  });

  // 进度
  document.getElementById("progress").oninput=e=>{
    video.currentTime=(e.target.value/100)*video.duration;
  };

  // 音量
  document.getElementById("volumeSlider").oninput=e=>{
    video.volume=e.target.value;
  };

  // 时间
  video.ontimeupdate=()=>{
    if(video.duration){
      document.getElementById("progress").value=(video.currentTime/video.duration)*100;
      document.getElementById("time").innerText=
        format(video.currentTime)+" / "+format(video.duration);
    }
  };

  // loading
  video.addEventListener("waiting", ()=>showLoading(true));
  video.addEventListener("playing", ()=>showLoading(false));

  // 重置
  document.getElementById("reset").onclick=()=>{
    lon=90; lat=0;
  };

  // 全屏
  document.getElementById("fullscreen").onclick=()=>{
    if(!document.fullscreenElement){
      document.body.requestFullscreen();
    }else{
      document.exitFullscreen();
    }
  };

  window.addEventListener("resize", onResize);
}

function getDistance(e){
  let dx=e.touches[0].clientX-e.touches[1].clientX;
  let dy=e.touches[0].clientY-e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function loadVideo(url){
  if(hls) hls.destroy();

  if(url.endsWith(".m3u8")){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
  }else{
    video.src=url;
    video.play();
  }
}

function togglePlay(){
  video.paused?video.play():video.pause();
}

function toggleVolume(){
  let v=document.getElementById("volumeSlider");
  v.style.display=v.style.display==="block"?"none":"block";
}

function showLoading(b){
  document.getElementById("loading").style.display=b?"block":"none";
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

function format(t){
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  return m+":"+(s<10?"0":"")+s;
}

function animate(){
  requestAnimationFrame(animate);

  lat=Math.max(-85,Math.min(85,lat));
  let phi=THREE.MathUtils.degToRad(90-lat);
  let theta=THREE.MathUtils.degToRad(lon);

  camera.lookAt(
    500*Math.sin(phi)*Math.cos(theta),
    500*Math.cos(phi),
    500*Math.sin(phi)*Math.sin(theta)
  );

  renderer.render(scene,camera);
}
</script>

</body>
</html>
